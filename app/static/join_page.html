<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Submit your documents</title>
<style>
  :root {
    --ink: #1c2126; --paper: #f6f4ef; --card: #ffffff; --line: #dcd7cc;
    --orange: #d9560c; --green: #2f6d47; --red: #b3361f; --muted: #6b6559;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 480px; margin: 0 auto; padding: 24px 18px 60px; min-height: 100vh; }
  .brand-header { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
  .brand-logo { width: 44px; height: 44px; border-radius: 10px; object-fit: contain; background: #fff; border: 1px solid var(--line); }
  .brand-name { font-weight: 700; font-size: 15px; }

  .progress { display: flex; gap: 6px; margin-bottom: 22px; }
  .progress .dot { flex: 1; height: 4px; border-radius: 2px; background: var(--line); }
  .progress .dot.done { background: var(--green); }
  .progress .dot.active { background: var(--orange); }

  .eyebrow { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--orange); font-weight: 700; }
  h1 { font-size: 22px; margin: 6px 0 8px; line-height: 1.3; }
  p.lead { color: var(--muted); font-size: 14.5px; line-height: 1.5; margin: 0 0 20px; white-space: pre-wrap; }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 20px; margin-bottom: 14px; }
  .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .card-title { font-weight: 700; font-size: 16px; }
  .pill { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
  .pill.upload_required { background: #ece7db; color: var(--muted); }
  .pill.uploaded { background: #e2f0e6; color: var(--green); }
  .card-desc { color: var(--muted); font-size: 13.5px; margin: 0 0 14px; line-height: 1.4; }
  .filename { font-size: 13px; color: var(--ink); margin-bottom: 10px; word-break: break-all; }

  input[type=file] { display: none; }
  label.filebtn, button.primary, button.secondary {
    display: inline-block; width: 100%; text-align: center; box-sizing: border-box;
    border: none; border-radius: 9px; padding: 13px 14px; font-size: 14.5px; font-weight: 700; cursor: pointer;
  }
  label.filebtn, button.primary { background: var(--ink); color: white; }
  label.filebtn.uploaded, button.primary:disabled { background: #cfc9ba; color: #7a7566; cursor: default; }
  button.secondary { background: transparent; color: var(--ink); border: 1px solid var(--line); margin-top: 8px; }

  .field { margin-bottom: 14px; }
  .field label { font-size: 12.5px; color: var(--muted); display: block; margin-bottom: 5px; font-weight: 600; }
  .field input, .field textarea {
    width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 11px; font-size: 16px;
    font-family: inherit; background: #fff; color: var(--ink);
  }
  .field textarea { resize: vertical; min-height: 60px; }

  .checklist { list-style: none; padding: 0; margin: 0 0 22px; }
  .checklist li { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line); font-size: 14.5px; }
  .checklist li:last-child { border-bottom: none; }
  .checklist .num { width: 22px; height: 22px; border-radius: 50%; background: var(--ink); color: white; font-size: 12px; font-weight: 700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

  footer.foot { text-align: center; color: var(--muted); font-size: 12px; margin-top: 24px; }
  .hero { text-align: center; padding: 50px 10px 20px; }
  .hero .big { font-size: 42px; margin-bottom: 10px; }
  .note-banner { background: #fbe9d8; color: #8a4a13; border-radius: 10px; padding: 14px; font-size: 14px; margin-bottom: 18px; line-height: 1.5; }
  #app.hidden { display: none; }
  .error { color: var(--red); font-size: 14px; padding: 30px 0; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <div id="loading" style="padding: 60px 0; text-align:center; color:#6b6559;">Loading…</div>
  <div id="app" class="hidden"></div>
</div>

<script>
const DOC_ORDER = ["insurance", "w9", "invoice"];
const DOC_LABELS = {
  insurance: { title: "Certificate of Insurance", desc: "Proof of general liability (or applicable) coverage." },
  w9:        { title: "W-9", desc: "Your completed IRS Form W-9." },
  invoice:   { title: "Invoice / Quote / Contract", desc: "The signed contract, quote, or invoice for this job." },
};

const pathParts = window.location.pathname.split("/").filter(Boolean);
const mode = pathParts[0]; // "join" or "pay"
const token = pathParts[1];
const origin = window.location.origin;

let brand = {};
let packet = null;
let wizardStep = 0; // 0 = intro/registration or doc-step start, 1..3 = docs

async function init() {
  const loadingEl = document.getElementById("loading");
  const appEl = document.getElementById("app");
  try {
    if (mode === "join") {
      const res = await fetch(`${origin}/api/public/accounts/${token}`);
      if (!res.ok) throw new Error("bad link");
      brand = await res.json();
      loadingEl.classList.add("hidden");
      appEl.classList.remove("hidden");
      renderRegistration();
    } else if (mode === "pay") {
      const res = await fetch(`${origin}/api/public/packets/${token}`);
      if (!res.ok) throw new Error("bad link");
      packet = await res.json();
      brand = { brand_name: packet.brand_name, brand_logo_url: packet.brand_logo_url, brand_welcome_message: packet.brand_welcome_message };
      loadingEl.classList.add("hidden");
      appEl.classList.remove("hidden");
      routeByStatus();
    } else {
      throw new Error("bad link");
    }
  } catch (e) {
    loadingEl.classList.add("hidden");
    appEl.classList.remove("hidden");
    appEl.innerHTML = `<div class="error">This link isn't valid. Ask for a new one.</div>`;
  }
}

function brandHeader() {
  if (!brand.brand_logo_url && !brand.brand_name) return "";
  return `
    <div class="brand-header">
      ${brand.brand_logo_url ? `<img class="brand-logo" src="${escapeAttr(brand.brand_logo_url)}" alt="" onerror="this.style.display='none'"/>` : ""}
      ${brand.brand_name ? `<div class="brand-name">${escapeHtml(brand.brand_name)}</div>` : ""}
    </div>
  `;
}

function renderRegistration() {
  const app = document.getElementById("app");
  app.innerHTML = `
    ${brandHeader()}
    <h1>Let's get you set up to be paid.</h1>
    <p class="lead">${brand.brand_welcome_message ? escapeHtml(brand.brand_welcome_message) + "\n\n" : ""}First, tell us a bit about you. Then we'll collect three quick documents.</p>
    <div class="card">
      <div class="field"><label>Your name</label><input id="reg-name" type="text" placeholder="Jane Smith" /></div>
      <div class="field"><label>Company name</label><input id="reg-company" type="text" placeholder="Smith Plumbing LLC" /></div>
      <div class="field"><label>Email</label><input id="reg-email" type="email" placeholder="jane@smithplumbing.com" /></div>
      <div class="field"><label>Job (optional)</label><input id="reg-job" type="text" placeholder="e.g. Bathroom rough-in, Unit 4B" /></div>
    </div>
    <button class="primary" onclick="submitRegistration()">Continue</button>
    <div id="reg-error" style="color:#b3361f; font-size:13px; margin-top:10px;"></div>
    <footer class="foot">Takes about two minutes. Files are reviewed before payment is released.</footer>
  `;
}

async function submitRegistration() {
  const name = document.getElementById("reg-name").value.trim();
  const company = document.getElementById("reg-company").value.trim();
  const email = document.getElementById("reg-email").value.trim();
  const job = document.getElementById("reg-job").value.trim();
  const errEl = document.getElementById("reg-error");
  if (!name || !company || !email) {
    errEl.textContent = "Please fill in your name, company, and email.";
    return;
  }
  errEl.textContent = "";
  const res = await fetch(`${origin}/api/public/accounts/${token}/start`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ contact_name: name, company_name: company, contact_email: email, job_description: job || null }),
  });
  if (!res.ok) {
    errEl.textContent = "Something went wrong. Please try again.";
    return;
  }
  packet = await res.json();
  window.history.replaceState(null, "", `/pay/${packet.public_token}`);
  wizardStep = 1;
  render();
}

function routeByStatus() {
  if (packet.status === "paid" || packet.status === "approved" || packet.status === "submitted") {
    render();
    return;
  }
  const firstOpenIdx = DOC_ORDER.findIndex(t => {
    const d = packet.documents.find(x => x.doc_type === t);
    return !d || d.status !== "uploaded";
  });
  wizardStep = firstOpenIdx === -1 ? 1 : (firstOpenIdx + 1);
  render();
}

function progressDots() {
  return `
    <div class="progress">
      ${DOC_ORDER.map((_, i) => {
        const stepNum = i + 1;
        const cls = wizardStep > stepNum ? "done" : (wizardStep === stepNum ? "active" : "");
        return `<div class="dot ${cls}"></div>`;
      }).join("")}
    </div>
  `;
}

function render() {
  const app = document.getElementById("app");

  if (packet.status === "paid") {
    app.innerHTML = `
      ${brandHeader()}
      <div class="hero">
        <div class="big">✅</div>
        <div style="font-weight:700; font-size:18px;">Payment sent</div>
        <div style="color:#6b6559; font-size:14px; margin-top:6px;">This job has been reviewed, approved, and paid.</div>
      </div>`;
    return;
  }
  if (packet.status === "approved") {
    app.innerHTML = `
      ${brandHeader()}
      <div class="hero">
        <div class="big">🎉</div>
        <div style="font-weight:700; font-size:18px;">You're all set</div>
        <div style="color:#6b6559; font-size:14px; margin-top:6px;">Everything's approved. You're cleared for payment — it's on its way.</div>
      </div>`;
    return;
  }
  if (packet.status === "submitted") {
    app.innerHTML = `
      ${brandHeader()}
      <div class="hero">
        <div class="big">⏳</div>
        <div style="font-weight:700; font-size:18px;">Thanks — under review</div>
        <div style="color:#6b6559; font-size:14px; margin-top:6px;">We've got all three documents and we're reviewing them now. You'll hear from us shortly.</div>
      </div>`;
    return;
  }

  renderDocStep(DOC_ORDER[wizardStep - 1]);
}

function renderDocStep(docType) {
  const app = document.getElementById("app");
  const doc = packet.documents.find(d => d.doc_type === docType) || { status: "upload_required" };
  const meta = DOC_LABELS[docType];
  const stepIndex = DOC_ORDER.indexOf(docType) + 1;
  const canUpload = doc.status !== "uploaded";
  const isInvoice = docType === "invoice";

  const revisionBanner = (packet.status === "needs_changes" && packet.revision_note && stepIndex === 1)
    ? `<div class="note-banner"><strong>Changes needed:</strong> ${escapeHtml(packet.revision_note)}</div>` : "";

  app.innerHTML = `
    ${brandHeader()}
    <div class="eyebrow">Step ${stepIndex} of 3</div>
    ${progressDots()}
    ${revisionBanner}
    <div class="card">
      <div class="card-head">
        <div class="card-title">${escapeHtml(meta.title)}</div>
        <div class="pill ${doc.status}">${doc.status.replace("_", " ")}</div>
      </div>
      <p class="card-desc">${escapeHtml(meta.desc)}</p>
      ${doc.original_filename ? `<div class="filename">📎 ${escapeHtml(doc.original_filename)}</div>` : ""}
      ${isInvoice && canUpload ? `
        <div class="field"><label>Amount (optional)</label><input type="text" inputmode="decimal" placeholder="e.g. 4500.00" id="amount-invoice" /></div>` : ""}
      ${canUpload ? `
        <label class="filebtn" for="file-input">Choose file to upload</label>
        <input type="file" id="file-input" accept="application/pdf,image/*" />
      ` : `<label class="filebtn uploaded">Done</label>`}
    </div>
    ${!canUpload ? `<button class="primary" onclick="goToStep(${stepIndex + 1})">Continue</button>` : ""}
    ${stepIndex > 1 ? `<button class="secondary" onclick="goToStep(${stepIndex - 1})">Back</button>` : ""}
  `;

  const input = document.getElementById("file-input");
  if (input) input.addEventListener("change", (e) => handleUpload(docType, e.target.files[0], stepIndex));
}

function goToStep(step) {
  if (step > 3) {
    routeByStatus();
    return;
  }
  wizardStep = step;
  render();
}

async function handleUpload(docType, file, stepIndex) {
  if (!file) return;
  const form = new FormData();
  form.append("doc_type", docType);
  form.append("file", file);
  if (docType === "invoice") {
    const amountEl = document.getElementById("amount-invoice");
    if (amountEl && amountEl.value) form.append("invoice_amount_cents", String(Math.round(parseFloat(amountEl.value) * 100)));
  }
  const res = await fetch(`${origin}/api/public/packets/${packet.public_token}/documents`, { method: "POST", body: form });
  if (!res.ok) {
    alert("Upload failed. Please try again.");
    return;
  }
  packet = await res.json();
  if (stepIndex >= 3) {
    routeByStatus();
  } else {
    goToStep(stepIndex + 1);
  }
}

function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function escapeAttr(str) { return escapeHtml(str); }

init();
</script>
</body>
</html>
