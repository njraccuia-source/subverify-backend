<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Upload your documents</title>
<style>
  :root {
    --ink: #1c2126;
    --paper: #f6f4ef;
    --card: #ffffff;
    --line: #dcd7cc;
    --orange: #d9560c;
    --green: #2f6d47;
    --red: #b3361f;
    --muted: #6b6559;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 520px; margin: 0 auto; padding: 24px 18px 60px; }
  header { margin-bottom: 20px; }
  .eyebrow { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--orange); font-weight: 700; }
  h1 { font-size: 22px; margin: 4px 0 2px; line-height: 1.25; }
  .sub { color: var(--muted); font-size: 14px; margin: 0; }
  .status-banner {
    border-radius: 10px; padding: 12px 14px; font-size: 14px; font-weight: 600;
    margin: 18px 0; display: flex; align-items: center; gap: 8px;
  }
  .status-banner.collecting { background: #fbe9d8; color: #8a4a13; }
  .status-banner.ready_to_pay { background: #e2f0e6; color: var(--green); }
  .status-banner.paid { background: #e2f0e6; color: var(--green); }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 16px; margin-bottom: 14px;
  }
  .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .card-title { font-weight: 700; font-size: 15px; }
  .pill {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
    padding: 3px 9px; border-radius: 999px;
  }
  .pill.upload_required { background: #ece7db; color: var(--muted); }
  .pill.pending_review { background: #fbe9d8; color: #8a4a13; }
  .pill.approved { background: #e2f0e6; color: var(--green); }
  .pill.rejected { background: #f6dbd6; color: var(--red); }
  .card-desc { color: var(--muted); font-size: 13px; margin: 0 0 10px; }
  .filename { font-size: 13px; color: var(--ink); margin-bottom: 8px; word-break: break-all; }
  .note { font-size: 13px; margin-top: 8px; padding: 8px 10px; border-radius: 8px; background: #f3f1ea; color: #4b4638; }
  .note.rejected { background: #f6dbd6; color: var(--red); }
  input[type=file] { display: none; }
  label.filebtn, button {
    display: inline-block; width: 100%; text-align: center;
    background: var(--ink); color: white; border: none; border-radius: 9px;
    padding: 12px 14px; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  label.filebtn.uploaded, button:disabled { background: #cfc9ba; color: #7a7566; cursor: default; }
  .amount-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .amount-row input {
    flex: 1; border: 1px solid var(--line); border-radius: 8px; padding: 10px; font-size: 14px;
  }
  footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 24px; }
  .paid-hero { text-align: center; padding: 40px 10px; }
  .paid-hero .big { font-size: 40px; margin-bottom: 8px; }
  #app.hidden { display: none; }
  .error { color: var(--red); font-size: 14px; padding: 30px 0; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <div id="loading" style="padding: 60px 0; text-align:center; color:#6b6559;">Loading…</div>
  <div id="app" class="hidden"></div>
</div>

<script>
const DOC_LABELS = {
  insurance: { title: "Certificate of Insurance", desc: "Proof of general liability (or applicable) coverage." },
  w9:        { title: "W-9", desc: "Your completed IRS Form W-9." },
  invoice:   { title: "Invoice / Quote / Contract", desc: "The signed contract, quote, or invoice for this job." },
};

const pathParts = window.location.pathname.split("/").filter(Boolean);
const token = pathParts[pathParts.length - 1];
const apiBase = `${window.location.origin}/api/public/packets/${token}`;

async function loadPacket() {
  const res = await fetch(apiBase);
  const loadingEl = document.getElementById("loading");
  const appEl = document.getElementById("app");
  if (!res.ok) {
    loadingEl.classList.add("hidden");
    appEl.classList.remove("hidden");
    appEl.innerHTML = `<div class="error">This link isn't valid. Ask for a new one.</div>`;
    return;
  }
  const packet = await res.json();
  loadingEl.classList.add("hidden");
  appEl.classList.remove("hidden");
  render(packet);
}

function statusBanner(status) {
  const map = {
    collecting: "Waiting on documents — upload each one below.",
    ready_to_pay: "All documents approved. You're cleared to be paid.",
    paid: "Payment has been sent for this job.",
  };
  return `<div class="status-banner ${status}">${map[status] || ""}</div>`;
}

function render(packet) {
  const app = document.getElementById("app");

  if (packet.status === "paid") {
    app.innerHTML = `
      <header>
        <div class="eyebrow">${escapeHtml(packet.job_description || "Job")}</div>
        <h1>${escapeHtml(packet.subcontractor_name)}</h1>
      </header>
      <div class="paid-hero">
        <div class="big">✅</div>
        <div style="font-weight:700; font-size:17px;">Payment sent</div>
        <div style="color:#6b6559; font-size:14px; margin-top:4px;">All documents were verified and this job has been paid.</div>
      </div>
    `;
    return;
  }

  const docsHtml = packet.documents
    .sort((a, b) => ["insurance", "w9", "invoice"].indexOf(a.doc_type) - ["insurance", "w9", "invoice"].indexOf(b.doc_type))
    .map(docCard).join("");

  app.innerHTML = `
    <header>
      <div class="eyebrow">${escapeHtml(packet.job_description || "Job")}</div>
      <h1>${escapeHtml(packet.subcontractor_name)}</h1>
      <p class="sub">Upload the three documents below. We'll review each one, then you're cleared to be paid.</p>
    </header>
    ${statusBanner(packet.status)}
    ${docsHtml}
    <footer>Files are sent securely and reviewed before payment is released.</footer>
  `;

  packet.documents.forEach((doc) => {
    const input = document.getElementById(`file-${doc.doc_type}`);
    if (input) input.addEventListener("change", (e) => handleUpload(doc.doc_type, e.target.files[0]));
  });
}

function docCard(doc) {
  const meta = DOC_LABELS[doc.doc_type] || { title: doc.doc_type, desc: "" };
  const canUpload = doc.status === "upload_required" || doc.status === "rejected";
  const isInvoice = doc.doc_type === "invoice";

  let noteHtml = "";
  if (doc.status === "rejected" && doc.reviewer_note) {
    noteHtml = `<div class="note rejected">Rejected: ${escapeHtml(doc.reviewer_note)} — please re-upload.</div>`;
  } else if (doc.status === "pending_review") {
    noteHtml = `<div class="note">Received — waiting on review.</div>`;
  } else if (doc.status === "approved") {
    noteHtml = `<div class="note">Approved${doc.reviewer_note ? ": " + escapeHtml(doc.reviewer_note) : "."}</div>`;
  }

  return `
    <div class="card">
      <div class="card-head">
        <div class="card-title">${escapeHtml(meta.title)}</div>
        <div class="pill ${doc.status}">${doc.status.replace("_", " ")}</div>
      </div>
      <p class="card-desc">${escapeHtml(meta.desc)}</p>
      ${doc.original_filename ? `<div class="filename">📎 ${escapeHtml(doc.original_filename)}</div>` : ""}
      ${isInvoice && canUpload ? `
        <div class="amount-row">
          <input type="text" inputmode="decimal" placeholder="Amount, e.g. 4500.00" id="amount-invoice" />
        </div>` : ""}
      ${canUpload ? `
        <label class="filebtn" for="file-${doc.doc_type}">Choose file to upload</label>
        <input type="file" id="file-${doc.doc_type}" accept="application/pdf,image/*" />
      ` : `<label class="filebtn uploaded">${doc.status === "pending_review" ? "Submitted" : "Done"}</label>`}
      ${noteHtml}
    </div>
  `;
}

async function handleUpload(docType, file) {
  if (!file) return;
  const form = new FormData();
  form.append("doc_type", docType);
  form.append("file", file);
  if (docType === "invoice") {
    const amountEl = document.getElementById("amount-invoice");
    if (amountEl && amountEl.value) form.append("invoice_amount_cents", String(Math.round(parseFloat(amountEl.value) * 100)));
  }
  const res = await fetch(`${apiBase}/documents`, { method: "POST", body: form });
  if (!res.ok) {
    alert("Upload failed. Please try again.");
    return;
  }
  const packet = await res.json();
  render(packet);
}

function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

loadPacket();
</script>
</body>
</html>
