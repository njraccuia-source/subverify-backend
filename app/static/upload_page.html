<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Upload your documents</title>
<style>
  :root {
    --ink: #1c2126;
    --paper: #f6f4ef;
    --card: #ffffff;
    --line: #dcd7cc;
    --orange: #d9560c;
    --green: #2f6d47;
    --red: #b3361f;
    --muted: #6b6559;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 480px; margin: 0 auto; padding: 24px 18px 60px; min-height: 100vh; }
  .brand-header { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
  .brand-logo { width: 44px; height: 44px; border-radius: 10px; object-fit: contain; background: #fff; border: 1px solid var(--line); }
  .brand-name { font-weight: 700; font-size: 15px; }

  .progress { display: flex; gap: 6px; margin-bottom: 22px; }
  .progress .dot { flex: 1; height: 4px; border-radius: 2px; background: var(--line); }
  .progress .dot.done { background: var(--green); }
  .progress .dot.active { background: var(--orange); }

  .eyebrow { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--orange); font-weight: 700; }
  h1 { font-size: 22px; margin: 6px 0 8px; line-height: 1.3; }
  p.lead { color: var(--muted); font-size: 14.5px; line-height: 1.5; margin: 0 0 20px; white-space: pre-wrap; }

  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 20px; margin-bottom: 14px;
  }
  .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .card-title { font-weight: 700; font-size: 16px; }
  .pill {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
    padding: 3px 9px; border-radius: 999px; white-space: nowrap;
  }
  .pill.upload_required { background: #ece7db; color: var(--muted); }
  .pill.pending_review { background: #fbe9d8; color: #8a4a13; }
  .pill.approved { background: #e2f0e6; color: var(--green); }
  .pill.rejected { background: #f6dbd6; color: var(--red); }
  .card-desc { color: var(--muted); font-size: 13.5px; margin: 0 0 14px; line-height: 1.4; }
  .filename { font-size: 13px; color: var(--ink); margin-bottom: 10px; word-break: break-all; }
  .note { font-size: 13px; margin-top: 10px; padding: 9px 11px; border-radius: 8px; background: #f3f1ea; color: #4b4638; }
  .note.rejected { background: #f6dbd6; color: var(--red); }

  input[type=file] { display: none; }
  label.filebtn, button.primary, button.secondary {
    display: inline-block; width: 100%; text-align: center; box-sizing: border-box;
    border: none; border-radius: 9px; padding: 13px 14px; font-size: 14.5px; font-weight: 700; cursor: pointer;
  }
  label.filebtn, button.primary { background: var(--ink); color: white; }
  label.filebtn.uploaded, button.primary:disabled { background: #cfc9ba; color: #7a7566; cursor: default; }
  button.secondary { background: transparent; color: var(--ink); border: 1px solid var(--line); margin-top: 8px; }

  .amount-row { margin-bottom: 12px; }
  .amount-row input {
    width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 11px; font-size: 14px;
  }
  .amount-row label { font-size: 12.5px; color: var(--muted); display:block; margin-bottom: 4px; }

  .checklist { list-style: none; padding: 0; margin: 0 0 22px; }
  .checklist li { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line); font-size: 14.5px; }
  .checklist li:last-child { border-bottom: none; }
  .checklist .num { width: 22px; height: 22px; border-radius: 50%; background: var(--ink); color: white; font-size: 12px; font-weight: 700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

  footer.foot { text-align: center; color: var(--muted); font-size: 12px; margin-top: 24px; }
  .paid-hero, .center-hero { text-align: center; padding: 50px 10px 20px; }
  .paid-hero .big, .center-hero .big { font-size: 42px; margin-bottom: 10px; }
  #app.hidden { display: none; }
  .error { color: var(--red); font-size: 14px; padding: 30px 0; text-align: center; }
  .step-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; font-size: 13px; color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <div id="loading" style="padding: 60px 0; text-align:center; color:#6b6559;">Loading…</div>
  <div id="app" class="hidden"></div>
</div>

<script>
const DOC_ORDER = ["insurance", "w9", "invoice"];
const DOC_LABELS = {
  insurance: { title: "Certificate of Insurance", desc: "Proof of general liability (or applicable) coverage." },
  w9:        { title: "W-9", desc: "Your completed IRS Form W-9." },
  invoice:   { title: "Invoice / Quote / Contract", desc: "The signed contract, quote, or invoice for this job." },
};

const pathParts = window.location.pathname.split("/").filter(Boolean);
const token = pathParts[pathParts.length - 1];
const apiBase = `${window.location.origin}/api/public/packets/${token}`;

let currentPacket = null;
let wizardStep = 0; // 0 = intro, 1..3 = docs, 4 = summary/paid

async function loadPacket() {
  const res = await fetch(apiBase);
  const loadingEl = document.getElementById("loading");
  const appEl = document.getElementById("app");
  loadingEl.classList.add("hidden");
  appEl.classList.remove("hidden");
  if (!res.ok) {
    appEl.innerHTML = `<div class="error">This link isn't valid. Ask for a new one.</div>`;
    return;
  }
  currentPacket = await res.json();
  if (wizardStep === 0) {
    const firstOpenIdx = DOC_ORDER.findIndex(t => {
      const d = currentPacket.documents.find(x => x.doc_type === t);
      return !d || d.status !== "approved";
    });
    wizardStep = currentPacket.status === "paid" ? 4 : (firstOpenIdx === -1 ? 4 : 0);
  }
  render();
}

function brandHeader() {
  if (!currentPacket.brand_logo_url && !currentPacket.brand_name) return "";
  return `
    <div class="brand-header">
      ${currentPacket.brand_logo_url ? `<img class="brand-logo" src="${escapeAttr(currentPacket.brand_logo_url)}" alt="" onerror="this.style.display='none'"/>` : ""}
      ${currentPacket.brand_name ? `<div class="brand-name">${escapeHtml(currentPacket.brand_name)}</div>` : ""}
    </div>
  `;
}

function progressDots() {
  if (currentPacket.status === "paid") return "";
  return `
    <div class="progress">
      ${DOC_ORDER.map((_, i) => {
        const stepNum = i + 1;
        const cls = wizardStep > stepNum ? "done" : (wizardStep === stepNum ? "active" : "");
        return `<div class="dot ${cls}"></div>`;
      }).join("")}
    </div>
  `;
}

function render() {
  const app = document.getElementById("app");

  if (currentPacket.status === "paid") {
    app.innerHTML = `
      ${brandHeader()}
      <div class="paid-hero">
        <div class="big">✅</div>
        <div style="font-weight:700; font-size:18px;">Payment sent</div>
        <div style="color:#6b6559; font-size:14px; margin-top:6px;">All documents were verified and this job has been paid.</div>
      </div>
    `;
    return;
  }

  if (wizardStep === 0) return renderIntro();
  if (wizardStep >= 1 && wizardStep <= 3) return renderDocStep(DOC_ORDER[wizardStep - 1]);
  return renderSummary();
}

function renderIntro() {
  const app = document.getElementById("app");
  app.innerHTML = `
    ${brandHeader()}
    <div class="eyebrow">${escapeHtml(currentPacket.job_description || "New job")}</div>
    <h1>Hi ${escapeHtml(currentPacket.subcontractor_name)}, let's get you set up to be paid.</h1>
    <p class="lead">${currentPacket.brand_welcome_message ? escapeHtml(currentPacket.brand_welcome_message) + "\n\n" : ""}We need three quick things from you. Once they're reviewed and approved, you're cleared for payment.</p>
    <ul class="checklist">
      ${DOC_ORDER.map((t, i) => `<li><span class="num">${i + 1}</span> ${escapeHtml(DOC_LABELS[t].title)}</li>`).join("")}
    </ul>
    <button class="primary" onclick="goToStep(1)">Get started</button>
    <footer class="foot">Takes about two minutes. Files are reviewed before payment is released.</footer>
  `;
}

function renderDocStep(docType) {
  const app = document.getElementById("app");
  const doc = currentPacket.documents.find(d => d.doc_type === docType) || { status: "upload_required" };
  const meta = DOC_LABELS[docType];
  const stepIndex = DOC_ORDER.indexOf(docType) + 1;
  const canUpload = doc.status === "upload_required" || doc.status === "rejected";
  const isInvoice = docType === "invoice";

  let noteHtml = "";
  if (doc.status === "rejected" && doc.reviewer_note) {
    noteHtml = `<div class="note rejected">Rejected: ${escapeHtml(doc.reviewer_note)} — please re-upload.</div>`;
  } else if (doc.status === "pending_review") {
    noteHtml = `<div class="note">Received — waiting on review. You can move on to the next item.</div>`;
  } else if (doc.status === "approved") {
    noteHtml = `<div class="note">Approved${doc.reviewer_note ? ": " + escapeHtml(doc.reviewer_note) : "."}</div>`;
  }

  app.innerHTML = `
    ${brandHeader()}
    <div class="step-nav">
      <span>Step ${stepIndex} of 3</span>
      <span></span>
    </div>
    ${progressDots()}
    <div class="card">
      <div class="card-head">
        <div class="card-title">${escapeHtml(meta.title)}</div>
        <div class="pill ${doc.status}">${doc.status.replace("_", " ")}</div>
      </div>
      <p class="card-desc">${escapeHtml(meta.desc)}</p>
      ${doc.original_filename ? `<div class="filename">📎 ${escapeHtml(doc.original_filename)}</div>` : ""}
      ${isInvoice && canUpload ? `
        <div class="amount-row">
          <label>Amount (optional)</label>
          <input type="text" inputmode="decimal" placeholder="e.g. 4500.00" id="amount-invoice" />
        </div>` : ""}
      ${canUpload ? `
        <label class="filebtn" for="file-input">Choose file to upload</label>
        <input type="file" id="file-input" accept="application/pdf,image/*" />
      ` : `<label class="filebtn uploaded">${doc.status === "pending_review" ? "Submitted" : "Done"}</label>`}
      ${noteHtml}
    </div>
    ${!canUpload ? `<button class="primary" onclick="goToStep(${stepIndex + 1})">Continue</button>` : ""}
    ${stepIndex > 1 ? `<button class="secondary" onclick="goToStep(${stepIndex - 1})">Back</button>` : ""}
  `;

  const input = document.getElementById("file-input");
  if (input) input.addEventListener("change", (e) => handleUpload(docType, e.target.files[0], stepIndex));
}

function renderSummary() {
  const app = document.getElementById("app");
  const allApproved = currentPacket.status === "ready_to_pay";
  app.innerHTML = `
    ${brandHeader()}
    <div class="center-hero">
      <div class="big">${allApproved ? "🎉" : "⏳"}</div>
      <div style="font-weight:700; font-size:18px;">${allApproved ? "You're all set" : "Almost there"}</div>
      <div style="color:#6b6559; font-size:14px; margin-top:6px;">
        ${allApproved ? "All three documents are approved. Payment is on its way." : "We're reviewing what you've submitted — you'll see this update once everything's approved."}
      </div>
    </div>
    <ul class="checklist">
      ${DOC_ORDER.map((t) => {
        const d = currentPacket.documents.find(x => x.doc_type === t) || { status: "upload_required" };
        const icon = d.status === "approved" ? "✅" : (d.status === "rejected" ? "⚠️" : "⏳");
        return `<li><span class="num" style="background:transparent;font-size:16px;">${icon}</span> ${escapeHtml(DOC_LABELS[t].title)} — ${d.status.replace("_", " ")}</li>`;
      }).join("")}
    </ul>
    <button class="secondary" onclick="location.reload()">Refresh status</button>
  `;
}

function goToStep(step) {
  wizardStep = step;
  render();
}

async function handleUpload(docType, file, stepIndex) {
  if (!file) return;
  const form = new FormData();
  form.append("doc_type", docType);
  form.append("file", file);
  if (docType === "invoice") {
    const amountEl = document.getElementById("amount-invoice");
    if (amountEl && amountEl.value) form.append("invoice_amount_cents", String(Math.round(parseFloat(amountEl.value) * 100)));
  }
  const res = await fetch(`${apiBase}/documents`, { method: "POST", body: form });
  if (!res.ok) {
    alert("Upload failed. Please try again.");
    return;
  }
  currentPacket = await res.json();
  goToStep(stepIndex + 1);
}

function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function escapeAttr(str) { return escapeHtml(str); }

loadPacket();
</script>
</body>
</html>
